name: ZaLo AI Team
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'ما هي المهمة التي تريد من فريق الذكاء الاصطناعي تنفيذها؟ (مثال: إنشاء صفحة تواصل معنا)'
        required: true
        type: string

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./agent-system
        run: npm install

      - name: Run Orchestrator
        working-directory: ./agent-system
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_TASK: ${{ github.event.inputs.task }}
        run: node orchestrator.js "$USER_TASK"
