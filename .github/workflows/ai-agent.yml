name: ZaLo AI Team
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'ما هي المهمة التي تريد من فريق الذكاء الاصطناعي تنفيذها؟ (مثال: إنشاء صفحة تواصل معنا)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        working-directory: ./agent-system
        run: npm install

      - name: Run Orchestrator
        working-directory: ./agent-system
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_TASK: ${{ github.event.inputs.task }}
        run: node orchestrator.js "$USER_TASK"

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'ZaLo AI Team'
          git config --global user.email 'ai-team@zalo.dz'
          git add .
          git commit -m "Auto-generated AI Code for: ${{ github.event.inputs.task }}" || echo "No changes to commit"
          git push
