<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - ZaLo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fcfdfe; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1e293b; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 10px; outline: none; }
        button { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .error { color: #ef4444; margin-top: 10px; text-align: center; }
        .success { color: #10b981; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>استعادة كلمة المرور 🔐</h2>
        <div class="form-group">
            <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
        </div>
        <button id="resetBtn">إرسال رابط الاستعادة</button>
        <div id="message"></div>
    </div>
    <script type="module">
        import { supabase } from './js/supabase-config.js';
        const resetBtn = document.getElementById('resetBtn');
        const messageDiv = document.getElementById('message');
        
        resetBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            
            resetBtn.disabled = true;
            messageDiv.textContent = 'جاري الإرسال...';
            
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/update-password.html',
            });
            
            if (error) {
                messageDiv.className = 'error';
                messageDiv.textContent = error.message;
                resetBtn.disabled = false;
            } else {
                messageDiv.className = 'success';
                messageDiv.textContent = 'تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني.';
            }
        });
    </script>
</body>
</html>
