<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التاجر - ZaLo Market</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Cairo & Great Vibes Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <!-- ZaLo Custom Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --sky-blue: #1d9bf0;
            --sky-light: #e0f2fe;
            --gold: #d4af37;
            --gold-dark: #b89116;
            --navy: #102a43;
            --white: #ffffff;
        }

        body {
            font-family: 'Cairo', sans-serif !important;
            background: linear-gradient(135deg, var(--sky-light) 0%, #ffffff 100%) !important;
            color: var(--navy) !important;
            min-height: 100vh;
        }

        /* Override dynamic products loaded via app.js to match the sky blue/white/gold theme */
        #merchant-product-list tr {
            color: var(--navy) !important;
            border-top: 1px solid rgba(212, 175, 55, 0.15) !important;
            font-weight: 600 !important;
            transition: background-color 0.2s;
        }
        #merchant-product-list tr:hover {
            background-color: rgba(29, 155, 240, 0.04) !important;
        }
        #merchant-product-list td {
            padding: 12px 16px !important;
        }

        /* Override dynamic orders loaded via app.js to match the sky blue/white/gold theme */
        #merchant-orders-list .bg-slate-800\/40 {
            background-color: var(--white) !important;
            border: 1.5px solid rgba(212, 175, 55, 0.25) !important;
            box-shadow: 0 4px 20px rgba(29, 155, 240, 0.05) !important;
            color: var(--navy) !important;
            border-radius: 16px !important;
        }
        #merchant-orders-list .text-white {
            color: var(--navy) !important;
            font-weight: 800 !important;
        }
        #merchant-orders-list .text-slate-300 {
            color: #475569 !important;
            font-weight: 600 !important;
        }
        #merchant-orders-list .bg-slate-700 {
            background-color: #f1f5f9 !important;
            color: var(--navy) !important;
            border: 1px solid #cbd5e1 !important;
        }
        #merchant-orders-list button.bg-sky-500 {
            background-color: var(--sky-blue) !important;
            color: var(--white) !important;
            font-weight: 800 !important;
            border-radius: 10px !important;
            transition: all 0.2s;
        }
        #merchant-orders-list button.bg-sky-500:hover {
            background-color: #0c85d0 !important;
            transform: translateY(-1px);
        }
        #merchant-orders-list select {
            border-radius: 10px !important;
            font-weight: 700 !important;
            padding: 6px 12px !important;
        }
    </style>
    
    <!-- Strict Authorization & Session Checking -->
    <script type="module">
        import sessionManager from './js/session-manager.js';

        const session = sessionManager.getSession();
        // Strict merchant verification: if not merchant, redirect to login
        if (!session.token || session.role !== 'merchant') {
            console.warn('🚨 Access Denied: User role is not merchant. Redirecting to login...');
            window.location.href = 'login.html';
        } else {
            console.log('✅ Welcome Merchant! Your dashboard is authorized and ready.');
        }
    </script>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-white/95 border-b-2 border-[#d4af37] w-full py-3 px-6 flex justify-between items-center backdrop-blur-md shadow-sm">
        <a href="index.html" class="flex items-center gap-1.5 text-xs text-sky-600 hover:text-sky-800 font-bold transition">
            <i class="fa-solid fa-house"></i>
            <span>العودة للرئيسية</span>
        </a>
        
        <!-- Header Unified Logo -->
        <div class="flex items-center gap-2">
            <svg width="34" height="34" viewBox="0 0 100 100" style="flex-shrink: 0;">
                <!-- Gold Outer Circle with elegant gap at the top -->
                <path d="M 29,13.6 A 42,42 0 1,0 71,13.6" fill="none" stroke="#d4af37" stroke-width="4.5" stroke-linecap="round" />
                
                <!-- Golden Palm Tree SVG Paths -->
                <path d="M47.5,75 L52.5,75 L52.1,68 L47.9,68 Z" fill="#d4af37" />
                <path d="M47.9,66 L52.1,66 L51.7,59 L48.3,59 Z" fill="#d4af37" />
                <path d="M48.3,57 L51.7,57 L51.3,50 L48.7,50 Z" fill="#d4af37" />
                <path d="M48.7,48 L51.3,48 L51,45 L49,45 Z" fill="#d4af37" />
                
                <!-- Fronds (Left) -->
                <path d="M49,46 C41,43 33,48 27,56 C35,51 43,49 49,48 Z" fill="#d4af37" />
                <path d="M49,46 C39,37 30,39 22,45 C32,42 41,43 49,46 Z" fill="#d4af37" />
                <path d="M49,46 C42,29 35,27 28,30 C36,31 43,37 49,44 Z" fill="#d4af37" />
                
                <!-- Fronds (Right) -->
                <path d="M51,46 C59,43 67,48 73,56 C65,51 57,49 51,48 Z" fill="#d4af37" />
                <path d="M51,46 C61,37 70,39 78,45 C68,42 59,43 51,46 Z" fill="#d4af37" />
                <path d="M51,46 C58,29 65,27 72,30 C64,31 57,37 51,44 Z" fill="#d4af37" />
                
                <!-- Top Fronds -->
                <path d="M50,45 C50,26 45,17 40,14 C47,19 50,31 50,45 Z" fill="#d4af37" />
                <path d="M50,45 C50,26 55,17 60,14 C53,19 50,31 50,45 Z" fill="#d4af37" />
                
                <!-- Letters "Z" and "L" inside the circle on either side of the trunk -->
                <text x="35" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">Z</text>
                <text x="65" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">L</text>
            </svg>
            <span style="font-family: 'Great Vibes', cursive; font-size: 24px; font-weight: normal; color: #d4af37; line-height: 1;">ZaLo</span>
        </div>

        <button onclick="logoutUser()" class="bg-red-50 text-red-600 border border-red-200 text-xs px-4 py-1.5 rounded-full hover:bg-red-600 hover:text-white font-bold transition">
            <i class="fa-solid fa-power-off ml-1"></i> خروج
        </button>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto px-6 py-8 space-y-8">
        
        <!-- Welcome banner card styled in White and Sky Blue with gold accent -->
        <div class="flex justify-between items-center bg-white border border-[#d4af37]/30 p-6 rounded-[24px] shadow-sm relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-sky-200/20 rounded-full blur-3xl"></div>
            <div class="text-right space-y-1 relative z-10">
                <span class="text-[10px] text-sky-600 font-extrabold uppercase tracking-wide block">مرحباً بك مجدداً في ZaLo</span>
                <h2 id="header-user-name" class="text-xl font-black text-slate-800">أحمد بن زكري (تاجر)</h2>
                <p class="text-xs text-slate-500">تابع المبيعات، أدرج منتجات ومعدلات جديدة، وتواصل مع زبائن المنيعة</p>
            </div>
            <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-[#1d9bf0] to-sky-300 text-white flex items-center justify-center text-2xl shadow-md shadow-sky-400/20">
                <i class="fa-solid fa-store"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Left Pane: Add Product Form (White card, Gold border, Sky blue primary actions) -->
            <div class="md:col-span-1 bg-white border border-[#d4af37]/25 rounded-3xl p-6 space-y-5 text-right shadow-sm">
                <h3 class="text-base font-black text-slate-800 flex items-center gap-2">
                    <i class="fa-solid fa-plus text-sky-500"></i> 
                    <span>إدراج منتج جديد</span>
                </h3>
                <form id="add-product-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] text-slate-600 font-bold mb-1">اسم المنتج:</label>
                        <input id="prod-name" type="text" class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl py-2.5 px-3 focus:border-sky-400 focus:bg-white focus:outline-none transition font-bold" placeholder="مثال: Galaxy A08" required>
                    </div>
                    <div>
                        <label class="block text-[11px] text-slate-600 font-bold mb-1">السعر (دج):</label>
                        <input id="prod-price" type="number" class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl py-2.5 px-3 focus:border-sky-400 focus:bg-white focus:outline-none transition font-bold" placeholder="25000" required>
                    </div>
                    <div>
                        <label class="block text-[11px] text-slate-600 font-bold mb-1">فئة المنتج المحددة:</label>
                        <select id="prod-category" class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl py-2.5 px-3 focus:border-sky-400 focus:bg-white focus:outline-none transition font-bold">
                            <option value="cat_phones">هواتف</option>
                            <option value="cat_electronic">إلكترونيات</option>
                            <option value="cat_parts">قطع غيار</option>
                            <option value="cat_food">مواد غذائية</option>
                            <option value="cat_clothes">ملابس</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] text-slate-600 font-bold mb-1">الكمية المتوفرة (المخزون):</label>
                        <input id="prod-stock" type="number" class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl py-2.5 px-3 focus:border-sky-400 focus:bg-white focus:outline-none transition font-bold" value="10" required>
                    </div>
                    <div>
                        <label class="block text-[11px] text-slate-600 font-bold mb-1">شرح ومواصفات المنتج:</label>
                        <textarea id="prod-desc" rows="3" class="w-full bg-slate-50 border border-slate-200 text-xs text-slate-800 rounded-xl py-2.5 px-3 focus:border-sky-400 focus:bg-white focus:outline-none transition font-bold" placeholder="..." required></textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-tr from-sky-500 to-[#1d9bf0] hover:to-sky-600 text-white font-black text-xs py-3.5 rounded-xl transition shadow-lg shadow-sky-500/15">حفظ وإدراج بالمتجر</button>
                </form>
            </div>

            <!-- Right Pane: Dashboard Overview & Lists (White and Sky Blue styled) -->
            <div class="md:col-span-2 space-y-6">
                
                <!-- Products catalog -->
                <div class="bg-white border border-[#d4af37]/25 rounded-3xl p-6 space-y-4 shadow-sm">
                    <h3 class="text-base font-black text-slate-800 text-right flex items-center justify-between">
                        <span class="flex items-center gap-2">
                            <i class="fa-solid fa-boxes-stacked text-[#d4af37]"></i>
                            <span>قائمة سلع المعرض بالمنيعة</span>
                        </span>
                        <span class="text-xs bg-sky-50 text-sky-600 px-3 py-1 rounded-full border border-sky-100 font-bold">نشط</span>
                    </h3>
                    <div class="overflow-x-auto w-full">
                        <table class="w-full text-right text-xs" style="min-width: 480px;">
                            <thead>
                                <tr class="text-slate-500 border-b border-slate-100">
                                    <th class="pb-3 text-right font-extrabold">اسم السلعة</th>
                                    <th class="pb-3 text-right font-extrabold">السعر</th>
                                    <th class="pb-3 text-right font-extrabold">المخزون</th>
                                    <th class="pb-3 text-center font-extrabold">العمليات</th>
                                </tr>
                            </thead>
                            <tbody id="merchant-product-list">
                                <!-- Loaded via app.js -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Orders management -->
                <div class="space-y-4">
                    <h3 class="text-base font-black text-slate-800 text-right flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-[#d4af37]"></i>
                        <span>طلبات المشتريات والخدمات المستلمة</span>
                    </h3>
                    <div id="merchant-orders-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Loaded dynamically via app.js -->
                    </div>
                </div>

            </div>

        </div>

    </main>

    <footer class="border-t border-slate-100 py-4 text-center text-xs text-slate-400 bg-white shadow-inner">
        <p>© 2026 ZaLo Market - لوحة الإدارة والتاجر.</p>
    </footer>

    <!-- Shared JS Engine -->
    <script src="js/app.js"></script>
</body>
</html>
