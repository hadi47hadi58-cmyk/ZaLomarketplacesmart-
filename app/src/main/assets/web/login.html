<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل الدخول - ZaLo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #1a5c2a;
      --green-light: #2d7a3a;
      --green-dark: #071a0b;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --bg: #080e0a;
      --card: #111a14;
      --border: #1e3028;
      --text: #e8f0ea;
      --text2: #7a9e83;
      --red: #ff4d4d;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,92,42,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(37,168,96,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 20px;
    }
    .logo-outer {
      width: 90px; height: 90px;
      margin: 0 auto 10px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 76px; height: 76px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 46px; height: 46px;
    }
    .brand-title {
      font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 18px; color: var(--gold2); font-weight: 700; margin-top: 5px;
      position: relative; display: inline-block; padding-bottom: 8px;
    }
    .brand-subtitle::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 16px; text-align: center;
    }

    .form-group {
      margin-bottom: 16px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: #fff; font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
      text-align: right;
    }
    .form-input:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201,168,76,0.15);
      background: rgba(0,0,0,0.4);
    }

    .toggle-pass {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      cursor: pointer; font-size: 14px;
      padding: 4px; z-index: 10;
    }
    .toggle-pass:hover {
      color: #fff;
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .success-msg {
      background: rgba(45, 140, 60, 0.1);
      border: 1px solid rgba(45, 140, 60, 0.2);
      color: #9cdcb0; padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .register-link {
      text-align: center; margin-top: 16px; font-size: 14px; color: var(--text2);
    }
    .register-link a {
      color: var(--gold2); font-weight: 700; text-decoration: none; margin-right: 4px;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">
  <i class="fa-solid fa-arrow-right"></i> الرئيسية
</a>

<div class="wrapper">
  <div class="logo-area">
    <div class="logo-outer">
      <div class="logo-inner">
        <img src="assets/logo.svg" alt="ZaLo" onerror="this.src='https://hadi47hadi58-cmyk.github.io/assets/logo.svg'" />
      </div>
    </div>
    <h1 class="brand-title">منصة ZaLo</h1>
    <p class="brand-subtitle">التسجيل و تسجيل الدخول</p>
  </div>

  <div class="card">
    <h2 class="card-title">🔐 تسجيل الدخول لحسابك</h2>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني ✉️</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" id="email" class="form-input" placeholder="example@domain.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور 🔑</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          <i class="fa-solid fa-eye toggle-pass" id="togglePass"></i>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">
        تسجيل الدخول 🚀
      </button>
    </form>

    <div class="register-link">
      ليس لديك حساب؟ <a href="register.html">أنشئ حساباً جديداً</a>
    </div>
  </div>
</div>

<script type="module">
  import { supabaseClient } from './js/supabase-db-compat.js';

  // Toggle Password Visibility
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePass.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      togglePass.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');

  // Check if already logged in and redirect
  async function checkActiveSession() {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session && session.user) {
        showSuccess('لديك جلسة نشطة بالفعل. جاري التوجيه...');
        await window.handleUserRedirect();
      }
    } catch (e) {
      console.warn("[Login] Session check failed:", e);
    }
  }
  checkActiveSession();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
      resetBtn();
      return;
    }

    try {
      console.log("[Login] Logging in via Supabase...");
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) throw error;

      console.log("[Login] Sign in successful. Setting tokens and redirecting...");
      
      const user = data.user;
      const role = user?.user_metadata?.role || 'customer';
      
      localStorage.setItem('zalo_token', data.session.access_token);
      localStorage.setItem('zalo_session_jwt', data.session.access_token);
      localStorage.setItem('zalo_user_role', role);
      localStorage.setItem('zalo_user_email', email);

      showSuccess('✨ تم تسجيل الدخول بنجاح! جاري تحويلك...');

      // Redirect using compatibility routing layer
      if (typeof window.handleUserRedirect === 'function') {
        await window.handleUserRedirect();
      } else {
        // Fallback redirection logic
        if (role === 'admin') {
          window.location.href = 'dashboard-admin.html';
        } else if (role === 'merchant') {
          window.location.href = 'dashboard-store.html';
        } else {
          window.location.href = 'customer-home.html';
        }
      }

    } catch (err) {
      console.error("[Login] Auth error:", err);
      showError(err.message || 'فشل تسجيل الدخول، يرجى التحقق من بياناتك');
      resetBtn();
    }
  });

  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
  }

  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
  }

  function resetBtn() {
    loginBtn.disabled = false;
    loginBtn.textContent = 'تسجيل الدخول 🚀';
  }
</script>

</body>
</html>
