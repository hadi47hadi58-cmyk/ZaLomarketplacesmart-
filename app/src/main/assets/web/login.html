<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تسجيل الدخول - ZaLo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #0ea5e9; /* Sky Blue replaces green */
      --green-light: #0284c7;
      --green-dark: #0369a1;
      --gold: #d4af37;
      --gold2: #dfb134;
      --bg: #fcfbfa; /* Light elegant cream background */
      --card: #ffffff; /* White card */
      --border: #cbd5e1; /* Clear light border */
      --text: #0f172a; /* Dark text */
      --text2: #64748b; /* Muted text */
      --red: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14,165,233,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 20px;
    }
    .logo-outer {
      width: 90px; height: 90px;
      margin: 0 auto 10px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 76px; height: 76px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 46px; height: 46px;
    }
    .brand-title {
      font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 18px; color: var(--gold2); font-weight: 700; margin-top: 5px;
      position: relative; display: inline-block; padding-bottom: 8px;
    }
    .brand-subtitle::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; text-align: center;
    }

    .form-group {
      margin-bottom: 16px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
      text-align: right;
    }
    .form-input:focus {
      outline: none; border-color: var(--green);
      box-shadow: 0 0 10px rgba(14,165,233,0.15);
      background: #ffffff;
    }

    .toggle-pass {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      cursor: pointer; font-size: 14px;
      padding: 4px; z-index: 10;
    }
    .toggle-pass:hover {
      color: #fff;
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .success-msg {
      background: rgba(45, 140, 60, 0.1);
      border: 1px solid rgba(45, 140, 60, 0.2);
      color: #9cdcb0; padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .register-link {
      text-align: center; margin-top: 16px; font-size: 14px; color: var(--text2);
    }
    .register-link a {
      color: var(--gold2); font-weight: 700; text-decoration: none; margin-right: 4px;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }
  </style>
</head>

<script type="module">
  import { supabaseClient } from './js/supabase-db-compat.js';

  // Toggle Password Visibility
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePass.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      togglePass.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');

  // Check if already logged in and redirect
  async function checkActiveSession() {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session && session.user) {
        showSuccess('لديك جلسة نشطة بالفعل. جاري التوجيه...');
        await window.handleUserRedirect();
      }
    } catch (e) {
      console.warn("[Login] Session check failed:", e);
    }
  }
  checkActiveSession();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
      resetBtn();
      return;
    }

    try {
      console.log("[Login] Logging in via Supabase...");
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) throw error;

      console.log("[Login] Sign in successful. Setting tokens and redirecting...");
      
      const user = data.user;
      let role = user?.user_metadata?.role || 'customer';
          if (user.email === 'hadi47hadi58@gmail.com') role = 'admin';
      
      localStorage.setItem('zalo_token', data.session.access_token);
      localStorage.setItem('zalo_session_jwt', data.session.access_token);
      localStorage.setItem('zalo_user_role', role);
      localStorage.setItem('zalo_user_email', email);

      showSuccess('✨ تم تسجيل الدخول بنجاح! جاري تحويلك...');

      // Redirect using compatibility routing layer
      if (typeof window.handleUserRedirect === 'function') {
        await window.handleUserRedirect();
      } else {
        // Fallback redirection logic
        if (role === 'admin') {
          window.location.href = 'dashboard-admin.html';
        } else if (role === 'merchant') {
          window.location.href = 'dashboard-store.html';
        } else {
          window.location.href = 'customer-home.html';
        }
      }

    } catch (err) {
      console.error("[Login] Auth error:", err);
      showError(err.message || 'فشل تسجيل الدخول، يرجى التحقق من بياناتك');
      resetBtn();
    }
  });

  
  window.handleGoogleLogin = async function() {
    try {
      if (!supabaseClient) throw new Error("خدمة المصادقة غير متاحة حالياً");
      showSuccess("جاري التحويل إلى Google...");
      const { data, error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.href
        }
      });
      if (error) throw error;
    } catch (err) {
      console.error("[Login] Google Auth Error:", err);
      showError(err.message || 'حدث خطأ أثناء محاولة الدخول بواسطة Google');
    }
  }

  // Check if we are returning from Google Login
  window.addEventListener('load', async () => {
    if (window.location.hash && window.location.hash.includes('access_token')) {
      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      const accessToken = hashParams.get('access_token');
      if (accessToken && supabaseClient) {
        showSuccess('✨ تم الدخول بنجاح عبر Google! جاري الفحص...');
        const { data: { user }, error } = await supabaseClient.auth.getUser(accessToken);
        if (user) {
          let role = user?.user_metadata?.role || 'customer';
          if (user.email === 'hadi47hadi58@gmail.com') role = 'admin';
          localStorage.setItem('zalo_token', accessToken);
          localStorage.setItem('zalo_session_jwt', accessToken);
          localStorage.setItem('zalo_user_role', role);
          localStorage.setItem('zalo_user_email', user.email);
          
          if (role === 'admin') window.location.href = 'dashboard-admin.html';
          else if (role === 'merchant') window.location.href = 'dashboard-store.html';
          else if (role === 'team' || role === 'manager') window.location.href = 'dashboard-manager.html';
          else window.location.href = 'customer-home.html';
        }
      }
    }
  });

  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
  }

  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
  }

  function resetBtn() {
    loginBtn.disabled = false;
    loginBtn.textContent = 'تسجيل الدخول 🚀';
