<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عمليات التتبع - ZaLo Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --g1: #0ea5e9;
            --g2: #0284c7;
            --gold: #d4af37;
            --bg: #fcfbfa;
            --card-bg: #ffffff;
            --text: #0f172a;
            --gray: #64748b;
            --border: #cbd5e1;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
            padding-bottom: 20px;
        }
        h1 {
            color: var(--gold);
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-val {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 5px;
        }
        .stat-lbl {
            font-size: 13px;
            color: var(--gray);
        }
        .operations-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .op-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .op-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .op-badge {
            background: rgba(37, 168, 96, 0.15);
            color: #82e3a1;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .op-badge.transit {
            background: rgba(240,165,0,0.15);
            color: var(--gold);
        }
        .op-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
        }
        .op-lbl {
            color: var(--gray);
        }
        .op-val {
            font-weight: 700;
            color: #fff;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: var(--gray);
            font-size: 13px;
        }
        .back-btn {
            display: inline-block;
            background: var(--g1);
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 20px;
            transition: 0.2s;
            border: 1px solid var(--border);
        }
        .back-btn:hover {
            background: var(--g2);
            border-color: var(--gold);
        }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fa-solid fa-route"></i> لوحة عمليات تتبع الشحنات واللوجستيات</h1>
    <p>نظرة عامة على حالة الشحن الجاري توزيعه عبر كافة الولايات الجزائرية</p>
</div>

<div class="stats-grid" id="statsGrid">
    <!-- Populated dynamically -->
</div>

<div class="operations-list" id="operationsList">
    <!-- Populated dynamically -->
</div>

<div style="text-align: center;">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-house"></i> العودة للرئيسية</a>
</div>

<script>
    const SEED_ORDERS = [
        { orderId: "ord_1001", userId: "user_hadi", storeId: "store_salam", productId: "prod_galaxy_a07", status: "قيد المراجعة", total: 22000, qty: 1, paymentMethod: "COD", address: "حي ميعاد، المنيعة (غرداية 47)", phone: "0666112233", trackingNumber: "DZ-COD-1001-ZALO", timestamp: Date.now() - 3600000 * 2 },
        { orderId: "ord_1002", userId: "user_hadi", storeId: "store_salam", productId: "prod_honor_x6c", status: "تم التسليم", total: 29000, qty: 1, paymentMethod: "BaridiMob", address: "بلدية حاسي الفحل (غرداية 47)", phone: "0666112233", trackingNumber: "DZ-BMOB-1002-ZALO", timestamp: Date.now() - 86400000 }
    ];

    function getLocalOrders() {
        try {
            const zaloOrders = localStorage.getItem('zalo_orders');
            if (zaloOrders) {
                return JSON.parse(zaloOrders);
            }
        } catch (e) {
            console.error(e);
        }
        return SEED_ORDERS;
    }

    function renderOperations() {
        const orders = getLocalOrders();

        // Calculate stats
        const activeShipments = orders.filter(o => {
            const status = (o.status || '').toUpperCase();
            return status !== 'تم التسليم' && status !== 'DELIVERED' && status !== 'CANCELLED' && status !== 'تم الإلغاء';
        }).length;

        const deliveredShipments = orders.filter(o => {
            const status = (o.status || '').toUpperCase();
            return status === 'تم التسليم' || status === 'DELIVERED';
        }).length;

        const successRate = orders.length > 0 
            ? ((deliveredShipments / orders.length) * 100).toFixed(1) 
            : '100.0';

        // Render Stats Grid
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card">
                <div class="stat-val" id="stat-active">${activeShipments}</div>
                <div class="stat-lbl">شحنة في طريقها للتوصيل</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-delivered">${deliveredShipments}</div>
                <div class="stat-lbl">شحنة تم تسليمها بنجاح</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-rate">${successRate}%</div>
                <div class="stat-lbl">نسبة نجاح التوصيل والتسليم المالي</div>
            </div>
        `;

        // Render Operations List
        const list = document.getElementById('operationsList');
        if (orders.length === 0) {
            list.innerHTML = `
                <div style="text-align: center; padding: 30px; color: var(--gray); background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--border);">
                    <i class="fa-solid fa-route" style="font-size: 32px; color: var(--gold); margin-bottom: 10px;"></i>
                    <p>لا توجد عمليات شحن نشطة في النظام حالياً.</p>
                </div>
            `;
            return;
        }

        list.innerHTML = orders.map(o => {
            const isDelivered = o.status === 'تم التسليم' || o.status === 'DELIVERED';
            const badgeClass = isDelivered ? '' : 'transit';
            const badgeText = isDelivered ? 'تم التسليم ✓' : 'في الطريق للولاية 🚛';
            const partner = o.paymentMethod === 'BaridiMob' ? 'المنارة لوجستيك' : 'ياليدين اكسبريس (Yalidine)';

            return `
                <div class="op-card">
                    <div class="op-head">
                        <strong style="font-size: 15px; color: var(--gold);">العملية #${o.trackingNumber || o.orderId || o.id}</strong>
                        <span class="op-badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="op-details">
                        <div><span class="op-lbl">العنوان / الولاية:</span> <span class="op-val">${o.address || 'غرداية'}</span></div>
                        <div><span class="op-lbl">شريك الشحن:</span> <span class="op-val">${partner}</span></div>
                        <div><span class="op-lbl">قيمة التحصيل (COD):</span> <span class="op-val">${o.total || o.totalAmount || 0} دج</span></div>
                        <div><span class="op-lbl">طريقة الدفع:</span> <span class="op-val">${o.paymentMethod || 'الدفع عند الاستلام'}</span></div>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.addEventListener('DOMContentLoaded', renderOperations);
</script>

<div class="footer">
    &copy; 2026 منصة ZaLo Smart. جميع الحقوق محفوظة لجمهورية الجزائر الديمقراطية الشعبية.
</div>

</body>
</html>
