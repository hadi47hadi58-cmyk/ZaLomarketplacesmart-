<!-- ZaLo Marketplace Smart Sync Update: 2026-07-16 -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بوابة المدير العام - ZaLo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #0ea5e9; /* Sky Blue replaces green */
      --green-light: #0284c7;
      --green-dark: #0369a1;
      --gold: #d4af37;
      --gold2: #dfb134;
      --bg: #fcfbfa; /* Light elegant cream background */
      --card: #ffffff; /* White card */
      --border: #cbd5e1; /* Clear light border */
      --text: #0f172a; /* Dark text */
      --text2: #64748b; /* Muted text */
      --red: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14,165,233,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 20px;
    }
    .logo-outer {
      width: 90px; height: 90px;
      margin: 0 auto 10px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 76px; height: 76px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 46px; height: 46px;
    }
    .brand-title {
      font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 18px; color: var(--gold2); font-weight: 700; margin-top: 5px;
      position: relative; display: inline-block; padding-bottom: 8px;
    }
    .brand-subtitle::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; text-align: center;
    }

    .form-group {
      margin-bottom: 16px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
      text-align: right;
    }
    .form-input:focus {
      outline: none; border-color: var(--green);
      box-shadow: 0 0 10px rgba(14,165,233,0.15);
      background: #ffffff;
    }

    .toggle-pass {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      cursor: pointer; font-size: 14px;
      padding: 4px; z-index: 10;
    }
    .toggle-pass:hover {
      color: #fff;
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .success-msg {
      background: rgba(45, 140, 60, 0.1);
      border: 1px solid rgba(45, 140, 60, 0.2);
      color: #9cdcb0; padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .register-link {
      text-align: center; margin-top: 16px; font-size: 14px; color: var(--text2);
    }
    .register-link a {
      color: var(--gold2); font-weight: 700; text-decoration: none; margin-right: 4px;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }

    /* Modern Login Type Segmented Tabs */
    .login-tabs {
      display: flex;
      background: rgba(148, 163, 184, 0.08);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 800;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn.active {
      background: rgba(14, 165, 233, 0.1) !important;
      color: var(--green) !important;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="logo-area" style="text-align: center; margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;">

    <div style="font-family: 'Great Vibes', cursive; font-size: 46px; font-weight: normal; color: #d4af37; line-height: 0.8; margin-top: -6px;">ZaLo</div>
    <!-- "السوق الذكي" Subtitle -->
    <div style="font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 800; color: #d4af37; letter-spacing: 0.5px; margin-top: 4px;">السوق الذكي</div>
  </div>

  <div class="card">

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">

        <div class="input-wrapper">

          <input type="text" id="otpCode" class="form-input" placeholder="أدخل رمز التحقق" maxlength="6" inputmode="numeric" style="padding-left: 130px; font-weight: 800; font-size: 15px;">
          <button type="button" id="sendOtpInlineBtn" style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); background: rgba(14, 165, 233, 0.08); border: 1.5px solid rgba(14, 165, 233, 0.2); color: var(--green); font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 800; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.25s; z-index: 10; display: flex; align-items: center; gap: 4px; white-space: nowrap;">

      <button type="button" id="googleLoginBtn" style="width: 100%; padding: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: #1e293b; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">

<script src="admin-login-debug.js"></script>
<script type="module">
  import { supabaseClient } from './js/supabase-db-compat.js';
  import { EmailVerification } from './js/email-verification.js';

  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');
  const sendOtpInlineBtn = document.getElementById('sendOtpInlineBtn');

  let currentMode = 'otp'; 
  let otpSent = false;
  let countdownVal = 60;
  let countdownTimer = null;

  // Also bind Google Login button programmatically
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  if (googleLoginBtn) {
    googleLoginBtn.addEventListener('click', () => window.handleGoogleLogin());
  }

  // Bind Emergency Bypass buttons programmatically
  const bypassAdminBtn = document.getElementById('bypassAdminBtn');
  if (bypassAdminBtn) {
    bypassAdminBtn.addEventListener('click', () => {
      if (window.triggerEmergencyBypass) window.triggerEmergencyBypass('ADMIN');
    });
  }
  const bypassMerchantBtn = document.getElementById('bypassMerchantBtn');
  if (bypassMerchantBtn) {
    bypassMerchantBtn.addEventListener('click', () => {
      if (window.triggerEmergencyBypass) window.triggerEmergencyBypass('MERCHANT');
    });
  }
  const bypassStaffBtn = document.getElementById('bypassStaffBtn');
  if (bypassStaffBtn) {
    bypassStaffBtn.addEventListener('click', () => {
      if (window.triggerEmergencyBypass) window.triggerEmergencyBypass('STAFF');
    });
  }
  const bypassCustomerBtn = document.getElementById('bypassCustomerBtn');
  if (bypassCustomerBtn) {
    bypassCustomerBtn.addEventListener('click', () => {
      if (window.triggerEmergencyBypass) window.triggerEmergencyBypass('CUSTOMER');
    });
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    countdownVal = 60;
    if (sendOtpInlineBtn) {
      sendOtpInlineBtn.disabled = true;
      sendOtpInlineBtn.style.background = '#f0fdf4';
      sendOtpInlineBtn.style.borderColor = '#bbf7d0';
      sendOtpInlineBtn.style.color = '#16a34a';
      sendOtpInlineBtn.innerHTML = `تم الإرسال (${countdownVal}ث)`;
    }
    
    countdownTimer = setInterval(() => {
      countdownVal--;
      if (countdownVal <= 0) {
        clearInterval(countdownTimer);
        resetOtpInlineBtn();
      } else {
        if (sendOtpInlineBtn) {
          sendOtpInlineBtn.innerHTML = `تم الإرسال (${countdownVal}ث)`;
        }
      }
    }, 1000);
  }

  function resetOtpInlineBtn() {
    if (sendOtpInlineBtn) {
      sendOtpInlineBtn.disabled = false;
      sendOtpInlineBtn.style.background = 'rgba(14, 165, 233, 0.08)';
      sendOtpInlineBtn.style.borderColor = 'rgba(14, 165, 233, 0.2)';
      sendOtpInlineBtn.style.color = 'var(--green)';
      sendOtpInlineBtn.innerHTML = 'إعادة إرسال 🔁';
    }
  }

  async function handleSendOtp() {
    console.log("[Login] handleSendOtp called.");
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      showError('يرجى إدخال بريد إلكتروني صحيح أولاً ✉️');
      return;
    }

    if (sendOtpInlineBtn) {
      sendOtpInlineBtn.disabled = true;
      sendOtpInlineBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';
    }
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    try {
      console.log("[Login] Calling EmailVerification.sendCode for:", email);
      const res = await EmailVerification.sendCode(email);
      console.log("[Login] EmailVerification response:", res);
      
      if (res.success) {
        otpSent = true;
        showSuccess('📥 تم إرسال رمز التحقق إلى بريدك بنجاح!');
        
        const otpField = document.getElementById('otpCode');
        if (otpField) {
          otpField.focus();
        }
        
        startCountdown();
      } else {
        throw new Error(res.message || 'فشل إرسال الرمز.');
      }
    } catch (err) {
      console.error("[Login] handleSendOtp error:", err);
      showError(err.message || 'فشل إرسال رمز التحقق. يرجى المحاولة مجدداً.');
      resetOtpInlineBtn();
    }
  }

  if (sendOtpInlineBtn) {
    sendOtpInlineBtn.addEventListener('click', handleSendOtp);
  }

  // Check if already logged in and redirect
  async function checkActiveSession() {
    try {
      console.log("[Login] Checking active session...");
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session && session.user) {
        console.log("[Login] Active session found. Redirecting...");
        showSuccess('لديك جلسة نشطة بالفعل. جاري التوجيه...');
        await window.handleUserRedirect(session);
      }
    } catch (e) {
      console.warn("[Login] Session check failed:", e);
    }
  }
  checkActiveSession();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log("[Login] Login form submitted.");
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const email = document.getElementById('email').value.trim();

    if (!otpSent) {
      console.log("[Login] OTP not sent yet, handling send OTP...");
      await handleSendOtp();
      return;
    }

    // Verify OTP Code
    const code = document.getElementById('otpCode').value.trim();
    if (!code || code.length < 4) {
      showError('يرجى إدخال رمز التحقق المكون من 6 أرقام 🔢');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق من الرمز...';

    try {
      console.log("[Login] Verifying OTP code:", code);
      const res = await EmailVerification.verifyCode(email, code);
      console.log("[Login] EmailVerification response:", res);
      if (res.success) {
        showSuccess('✨ تم التحقق من الرمز بنجاح! جاري تسجيل الدخول الآمن...');
        setTimeout(() => {
          if (window.triggerEmergencyBypass) {
            window.triggerEmergencyBypass('ADMIN');
          } else {
            window.location.replace('dashboard-admin.html');
          }
        }, 800);
      } else {
        throw new Error(res.message || 'رمز التحقق غير صحيح.');
      }
    } catch (err) {
      console.error("[Login] OTP Verification error:", err);
      showError(err.message || 'رمز التحقق الذي أدخلته غير صحيح أو منتهي الصلاحية ❌');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'تأكيد الدخول الآمن 🔐';
    }
  });

  window.handleGoogleLogin = async function() {
    console.log("[Login] handleGoogleLogin called.");
    try {
      const client = supabaseClient || window.supabase;
      if (!client) throw new Error("خدمة المصادقة غير متاحة حالياً");
      
      showSuccess("جاري بدء تسجيل الدخول الآمن عبر Google...");
      
      if (window.AndroidInterface && typeof window.AndroidInterface.requestGoogleSignIn === 'function') {
        console.log("[Google Auth] Running inside Android WebView. Directing to Native SDK...");
        window.AndroidInterface.requestGoogleSignIn();
      } else {
        console.log("[Google Auth] Running inside Browser. Directing to Web OAuth...");
        const redirectUrl = window.location.origin + window.location.pathname;
        console.log("[Google Auth] OAuth redirect URL:", redirectUrl);
        const { error } = await client.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: redirectUrl }
        });
        if (error) throw error;
      }
    } catch (err) {
      console.error("[Login] Google Auth Error:", err);
      showError(err.message || 'حدث خطأ أثناء محاولة الدخول بواسطة Google');
    }
  }

  window.addEventListener("DOMContentLoaded", () => { 
    const searchParams = new URLSearchParams(window.location.search); 
    if (searchParams.has("reason")) { 
      const reason = searchParams.get("reason"); 
      if (reason === "forbidden") showError("ليس لديك صلاحيات لدخول هذه الصفحة"); 
      if (reason === "unauthorized") showError("يرجى تسجيل الدخول أولاً"); 
    }
    const hash = window.location.hash || window.location.search; 
    if (hash && hash.includes("error=")) { 
      const params = new URLSearchParams(hash.replace("?", "").replace("#", "")); 
      const desc = params.get("error_description") || params.get("error"); 
      showError("حدث خطأ أثناء المصادقة: " + decodeURIComponent(desc).replace(/\+/g, " ")); 
    } 
  });

  function showError(msg) {
    console.error("[Login Error UI]:", msg);
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
  }

  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
  }

  function resetBtn() {
    loginBtn.disabled = false;
    loginBtn.textContent = otpSent ? 'تأكيد الدخول الآمن 🔐' : 'أرسل رمز الدخول للبريد ✉️';
  }
</script>

</body>
</html>
