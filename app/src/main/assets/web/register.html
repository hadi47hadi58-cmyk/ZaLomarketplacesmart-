<!-- ZaLo Marketplace Smart Sync Update: 2026-07-16 -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>إنشاء حساب جديد - ZaLo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #0ea5e9; /* Sky Blue replaces green */
      --green-light: #0284c7;
      --green-dark: #0369a1;
      --emerald: #0ea5e9;
      --emerald-dark: #0284c7;
      --gold: #d4af37;
      --gold2: #dfb134;
      --bg: #fcfbfa; /* Light elegant cream background */
      --card: #ffffff; /* White card */
      --border: #cbd5e1; /* Clear light border */
      --text: #0f172a; /* Dark text */
      --text2: #64748b; /* Muted text */
      --red: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14,165,233,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 20px;
    }
    .logo-outer {
      width: 90px; height: 90px;
      margin: 0 auto 10px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 76px; height: 76px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 46px; height: 46px;
    }
    .brand-title {
      font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 18px; color: var(--gold2); font-weight: 700; margin-top: 5px;
      position: relative; display: inline-block; padding-bottom: 8px;
    }
    .brand-subtitle::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; text-align: center;
    }

    .form-group {
      margin-bottom: 16px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
      text-align: right;
    }
    .form-input:focus {
      outline: none; border-color: var(--green);
      box-shadow: 0 0 10px rgba(14,165,233,0.15);
      background: #ffffff;
    }

    .toggle-pass {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      cursor: pointer; font-size: 14px;
      padding: 4px; z-index: 10;
    }
    .toggle-pass:hover {
      color: #fff;
    }

    .submit-btn {
      width: 100%; background: var(--emerald);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(45,140,60,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--emerald-dark); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .success-msg {
      background: rgba(45, 140, 60, 0.1);
      border: 1px solid rgba(45, 140, 60, 0.2);
      color: #9cdcb0; padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .register-link {
      text-align: center; margin-top: 16px; font-size: 14px; color: var(--text2);
    }
    .register-link a {
      color: var(--gold2); font-weight: 700; text-decoration: none; margin-right: 4px;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">
  <i class="fa-solid fa-arrow-right"></i> الرئيسية
</a>

<div class="wrapper">
  <div class="logo-area" style="text-align: center; margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;">
    <!-- Circular Golden Palm Tree Logo -->
    <svg width="80" height="80" viewBox="0 0 100 100" style="margin-bottom: 2px;">
      <!-- Gold Outer Circle with elegant gap at the top -->
      <path d="M 29,13.6 A 42,42 0 1,0 71,13.6" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Golden Palm Tree SVG Paths -->
      <!-- Segmented Trunk matching the printed brand card -->
      <path d="M47.5,75 L52.5,75 L52.1,68 L47.9,68 Z" fill="#d4af37" />
      <path d="M47.9,66 L52.1,66 L51.7,59 L48.3,59 Z" fill="#d4af37" />
      <path d="M48.3,57 L51.7,57 L51.3,50 L48.7,50 Z" fill="#d4af37" />
      <path d="M48.7,48 L51.3,48 L51,45 L49,45 Z" fill="#d4af37" />
      
      <!-- Fronds (Left) -->
      <path d="M49,46 C41,43 33,48 27,56 C35,51 43,49 49,48 Z" fill="#d4af37" />
      <path d="M49,46 C39,37 30,39 22,45 C32,42 41,43 49,46 Z" fill="#d4af37" />
      <path d="M49,46 C42,29 35,27 28,30 C36,31 43,37 49,44 Z" fill="#d4af37" />
      
      <!-- Fronds (Right) -->
      <path d="M51,46 C59,43 67,48 73,56 C65,51 57,49 51,48 Z" fill="#d4af37" />
      <path d="M51,46 C61,37 70,39 78,45 C68,42 59,43 51,46 Z" fill="#d4af37" />
      <path d="M51,46 C58,29 65,27 72,30 C64,31 57,37 51,44 Z" fill="#d4af37" />
      
      <!-- Top Fronds -->
      <path d="M50,45 C50,26 45,17 40,14 C47,19 50,31 50,45 Z" fill="#d4af37" />
      <path d="M50,45 C50,26 55,17 60,14 C53,19 50,31 50,45 Z" fill="#d4af37" />
      
      <!-- Letters "Z" and "L" inside the circle on either side of the trunk -->
      <text x="35" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">Z</text>
      <text x="65" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">L</text>
    </svg>
    
    <!-- Stylized "ZaLo" Text exactly matching image script -->
    <div style="font-family: 'Great Vibes', cursive; font-size: 46px; font-weight: normal; color: #d4af37; line-height: 0.8; margin-top: -6px;">ZaLo</div>
    <!-- "السوق الذكي" Subtitle -->
    <div style="font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 800; color: #d4af37; letter-spacing: 0.5px; margin-top: 4px;">السوق الذكي</div>
  </div>

  <div class="card">
    <h2 class="card-title">✨ إنشاء حساب جديد</h2>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">الاسم الكامل ✍️</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="fullName" class="form-input" placeholder="الاسم الكامل" required autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">البريد الإلكتروني ✉️</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" id="email" class="form-input" placeholder="example@domain.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">رقم الهاتف 📞</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-phone input-icon"></i>
          <input type="tel" id="phone" class="form-input" placeholder="05XX XX XX XX" required autocomplete="tel">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور 🔑</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6" autocomplete="new-password">
          <i class="fa-solid fa-eye toggle-pass" id="togglePass"></i>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="registerBtn">
        أنشئ حسابي ✅
      </button>
    </form>

    <div class="register-link">
      لديك حساب بالفعل؟ <a href="customer-login.html">تسجيل الدخول الآن</a>
    </div>
  </div>
</div>

<script type="module">
  import { supabaseClient } from './js/supabase-db-compat.js';

  // Toggle Password Visibility
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePass.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      togglePass.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  const form = document.getElementById('registerForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const registerBtn = document.getElementById('registerBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري إنشاء الحساب...';

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;

    if (!fullName || !email || !phone || password.length < 6) {
      showError('يرجى ملء جميع الحقول بشكل صحيح (كلمة المرور 6 أحرف على الأقل)');
      resetBtn();
      return;
    }

    try {
      console.log("[Register] Attempting sign up in Supabase Auth...");
      // 1. Create account in Supabase Auth
      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          data: { 
            full_name: fullName, 
            phone: phone, 
            role: 'customer' 
          }
        }
      });

      if (error) throw error;

      console.log("[Register] Auth signUp successful. Auto signing in...");
      
      // 2. Auto sign in with password to establish session
      const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (signInError) {
        console.warn("[Register] Auto sign in failed, redirecting manually to login:", signInError.message);
        showSuccess('تم إنشاء حسابك بنجاح! جاري تحويلك لصفحة تسجيل الدخول...');
        setTimeout(() => {
          window.location.href = 'customer-login.html';
        }, 2000);
        return;
      }

      const user = signInData.user;
      
      // 3. Create record in public.profiles or public.users for DB compatibility
      console.log("[Register] Syncing profile to database...");
      try {
        const profileData = {
          id: user.id,
          phone: phone,
          email: email,
          role: 'customer',
          updated_at: new Date().toISOString()
        };
        
        await supabaseClient.from('profiles').upsert(profileData);
        
        // Also update users table if present
        try {
          await supabaseClient.from('users').upsert({
            supabase_uid: user.id,
            email: email,
            role: 'CUSTOMER',
            phone: phone
          });
        } catch (usersErr) {
          console.warn("[Register] Skipping users table insert:", usersErr.message);
        }

      } catch (dbErr) {
        console.warn("[Register] Non-blocking profile synchronization error:", dbErr.message);
      }

      // Save user role and details in localStorage
      localStorage.setItem('zalo_user_role', 'customer');
      localStorage.setItem('zalo_user_email', email);
      localStorage.setItem('zalo_token', signInData.session.access_token);
      localStorage.setItem('zalo_session_jwt', signInData.session.access_token);
      
      const activeSessionUser = {
        uid: user.id,
        email: email,
        name: fullName,
        phone: phone,
        role: 'customer',
        status: 'ACTIVE'
      };
      localStorage.setItem('zalo_active_session', JSON.stringify(activeSessionUser));

      showSuccess('✨ تم إنشاء الحساب والدخول بنجاح! جاري التحويل...');
      
      setTimeout(() => {
        window.location.href = 'customer-home.html';
      }, 1500);

    } catch (err) {
      console.error("[Register] Error during registration process:", err);
      showError(err.message || 'حدث خطأ، حاول مرة أخرى');
      resetBtn();
    }
  });

  function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    errorDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
    successDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function resetBtn() {
    registerBtn.disabled = false;
    registerBtn.textContent = 'أنشئ حسابي ✅';
  }
</script>

</body>
</html>
