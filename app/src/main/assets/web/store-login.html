<!-- ZaLo Marketplace Smart Sync Update: 2026-07-16 -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بوابة التاجر - ZaLo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #0ea5e9; /* Sky Blue replaces green */
      --green-light: #0284c7;
      --green-dark: #0369a1;
      --gold: #d4af37;
      --gold2: #dfb134;
      --bg: #fcfbfa; /* Light elegant cream background */
      --card: #ffffff; /* White card */
      --border: #cbd5e1; /* Clear light border */
      --text: #0f172a; /* Dark text */
      --text2: #64748b; /* Muted text */
      --red: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14,165,233,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 440px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 20px;
    }
    .logo-outer {
      width: 90px; height: 90px;
      margin: 0 auto 10px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 76px; height: 76px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 46px; height: 46px;
    }
    .brand-title {
      font-size: 24px; font-weight: 900; color: var(--text); letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 18px; color: var(--gold2); font-weight: 700; margin-top: 5px;
      position: relative; display: inline-block; padding-bottom: 8px;
    }
    .brand-subtitle::after {
      content: '';
      position: absolute; bottom: 0; left: 25%; right: 25%;
      height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 16px; text-align: center;
    }

    .form-group {
      margin-bottom: 16px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
      text-align: right;
    }
    .form-input:focus {
      outline: none; border-color: var(--green);
      box-shadow: 0 0 10px rgba(14,165,233,0.15);
      background: #ffffff;
    }

    .toggle-pass {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2);
      cursor: pointer; font-size: 14px;
      padding: 4px; z-index: 10;
    }
    .toggle-pass:hover {
      color: #fff;
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .success-msg {
      background: rgba(45, 140, 60, 0.1);
      border: 1px solid rgba(45, 140, 60, 0.2);
      color: #9cdcb0; padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .register-link {
      text-align: center; margin-top: 16px; font-size: 14px; color: var(--text2);
    }
    .register-link a {
      color: var(--gold2); font-weight: 700; text-decoration: none; margin-right: 4px;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">
  <i class="fa-solid fa-arrow-right"></i> الرئيسية
</a>

<div class="wrapper">
  <div class="logo-area" style="text-align: center; margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;">
    <!-- Circular Golden Palm Tree Logo -->
    <svg width="80" height="80" viewBox="0 0 100 100" style="margin-bottom: 2px;">
      <!-- Gold Outer Circle with elegant gap at the top -->
      <path d="M 29,13.6 A 42,42 0 1,0 71,13.6" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" />
      
      <!-- Golden Palm Tree SVG Paths -->
      <!-- Segmented Trunk matching the printed brand card -->
      <path d="M47.5,75 L52.5,75 L52.1,68 L47.9,68 Z" fill="#d4af37" />
      <path d="M47.9,66 L52.1,66 L51.7,59 L48.3,59 Z" fill="#d4af37" />
      <path d="M48.3,57 L51.7,57 L51.3,50 L48.7,50 Z" fill="#d4af37" />
      <path d="M48.7,48 L51.3,48 L51,45 L49,45 Z" fill="#d4af37" />
      
      <!-- Fronds (Left) -->
      <path d="M49,46 C41,43 33,48 27,56 C35,51 43,49 49,48 Z" fill="#d4af37" />
      <path d="M49,46 C39,37 30,39 22,45 C32,42 41,43 49,46 Z" fill="#d4af37" />
      <path d="M49,46 C42,29 35,27 28,30 C36,31 43,37 49,44 Z" fill="#d4af37" />
      
      <!-- Fronds (Right) -->
      <path d="M51,46 C59,43 67,48 73,56 C65,51 57,49 51,48 Z" fill="#d4af37" />
      <path d="M51,46 C61,37 70,39 78,45 C68,42 59,43 51,46 Z" fill="#d4af37" />
      <path d="M51,46 C58,29 65,27 72,30 C64,31 57,37 51,44 Z" fill="#d4af37" />
      
      <!-- Top Fronds -->
      <path d="M50,45 C50,26 45,17 40,14 C47,19 50,31 50,45 Z" fill="#d4af37" />
      <path d="M50,45 C50,26 55,17 60,14 C53,19 50,31 50,45 Z" fill="#d4af37" />
      
      <!-- Letters "Z" and "L" inside the circle on either side of the trunk -->
      <text x="35" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">Z</text>
      <text x="65" y="62" font-family="'Cairo', sans-serif" font-weight="900" font-size="14" fill="#d4af37" text-anchor="middle">L</text>
    </svg>
    
    <!-- Stylized "ZaLo" Text exactly matching image script -->
    <div style="font-family: 'Great Vibes', cursive; font-size: 46px; font-weight: normal; color: #d4af37; line-height: 0.8; margin-top: -6px;">ZaLo</div>
    <!-- "السوق الذكي" Subtitle -->
    <div style="font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 800; color: #d4af37; letter-spacing: 0.5px; margin-top: 4px;">السوق الذكي</div>
  </div>

  <div class="card">
    <h2 class="card-title">🔐 تسجيل الدخول - لوحة التاجر</h2>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني ✉️</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" id="email" class="form-input" placeholder="example@domain.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور 🔑</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          <i class="fa-solid fa-eye toggle-pass" id="togglePass"></i>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">
        تسجيل الدخول 🚀
      </button>
    </form>
      <div style="margin: 20px 0; display: flex; align-items: center; justify-content: center;">
        <div style="height: 1px; background: var(--border); flex: 1;"></div>
        <span style="margin: 0 10px; color: var(--text2); font-size: 12px; font-weight: 700;">أو الدخول عبر</span>
        <div style="height: 1px; background: var(--border); flex: 1;"></div>
      </div>
      <button type="button" onclick="handleGoogleLogin()" style="width: 100%; padding: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: #1e293b; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s;">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 20px; height: 20px;">
        المتابعة بحساب Google
      </button>

  </div>
</div>

<script type="module">
  import { supabaseClient } from './js/supabase-db-compat.js';

  // Toggle Password Visibility
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');
  togglePass.addEventListener('click', () => {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      togglePass.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      togglePass.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  const form = document.getElementById('loginForm');
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const loginBtn = document.getElementById('loginBtn');

  // Check if already logged in and redirect
  async function checkActiveSession() {
    try {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session && session.user) {
        showSuccess('لديك جلسة نشطة بالفعل. جاري التوجيه...');
        await window.handleUserRedirect();
      }
    } catch (e) {
      console.warn("[Login] Session check failed:", e);
    }
  }
  checkActiveSession();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحقق...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('يرجى إدخال البريد الإلكتروني وكلمة المرور');
      resetBtn();
      return;
    }

    try {
      console.log("[Login] Logging in via Supabase...");
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) throw error;

      console.log("[Login] Sign in successful. Setting tokens and redirecting...");
      showSuccess('✨ تم تسجيل الدخول بنجاح! جاري تحويلك...');

      if (typeof window.handleUserRedirect === 'function') {
        await window.handleUserRedirect(data.session);
      } else {
        window.location.reload();
      }
    } catch (err) {
      console.error("[Login] Auth error:", err);
      showError(err.message || 'فشل تسجيل الدخول، يرجى التحقق من بياناتك');
      resetBtn();
    }
  });

  
  window.handleGoogleLogin = async function() {
    try {
      if (!supabaseClient) throw new Error("خدمة المصادقة غير متاحة حالياً");
      showSuccess("جاري بدء تسجيل الدخول الآمن عبر Google...");
      
      if (window.AndroidInterface && typeof window.AndroidInterface.requestGoogleSignIn === 'function') {
        console.log("[Google Auth] Running inside Android WebView. Directing to Native SDK...");
        window.AndroidInterface.requestGoogleSignIn();
      } else {
        console.log("[Google Auth] Running inside Browser. Directing to Web OAuth...");
        const redirectUrl = window.location.origin + window.location.pathname;
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: redirectUrl }
        });
        if (error) throw error;
      }
    } catch (err) {
      console.error("[Login] Google Auth Error:", err);
      showError(err.message || 'حدث خطأ أثناء محاولة الدخول بواسطة Google');
    }
  }

  // الاستماع التلقائي لحدث تغيير حالة المصادقة من Supabase عند العودة من Google
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      showSuccess('✨ تم تأكيد تسجيل الدخول! جاري التوجيه...');
      if (typeof window.handleUserRedirect === 'function') {
        await window.handleUserRedirect();
      } else {
        const path = window.location.pathname;
        let target = 'customer-home.html';
        if (path.includes('admin-login')) target = 'dashboard-admin.html';
        else if (path.includes('store-login')) target = 'dashboard-store.html';
        else if (path.includes('staff-login')) target = 'dashboard-manager.html';
        window.location.replace(target);
      }
    }
  });

  function showError(msg) {

    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
  }

  function showSuccess(msg) {
    successDiv.textContent = msg;
    successDiv.style.display = 'block';
  }

  function resetBtn() {
    loginBtn.disabled = false;
    loginBtn.textContent = 'تسجيل الدخول 🚀';
  }
</script>

</body>
</html>
