<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="refresh" content="0; url=web/index.html">
  <title>ZaLo Market - السوق الذكي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --g1: #1a5c2a;
      --g2: #071a0b;
      --gold: #c9a84c;
      --gold2: #e8c97a;
    }
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, var(--g2), var(--g1));
      color: #fff;
      font-family: 'Cairo', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .logo-box {
      width: 120px;
      height: 120px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .logo-box img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(201, 168, 76, 0.4));
    }
    .title {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--gold2);
      margin-bottom: 32px;
      font-weight: 700;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--gold);
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .redirect-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    .redirect-link {
      color: var(--gold2);
      text-decoration: none;
      font-weight: bold;
      border-bottom: 1px dashed var(--gold2);
    }
  </style>
  <script type="text/javascript">
    // Execute instant redirection immediately
    window.location.replace("web/index.html");
  </script>
</head>
<body>
  <div class="container">
    <div class="logo-box">
      <img src="web/logo.svg" alt="ZaLo" onerror="this.src='https://placehold.co/120x120/1a5c2a/white?text=ZaLo'">
    </div>
    <div class="title">ZaLo Market</div>
    <div class="subtitle">جاري الدخول إلى السوق الذكي...</div>
    <div class="loader"></div>
    <div class="redirect-text">
      لم يتم تحويلك تلقائياً؟ 
      <a class="redirect-link" href="web/index.html">اضغط هنا للانتقال المباشر</a>
    </div>
  </div>
</body>
</html>
