<!-- ZaLo Marketplace Smart Sync Update: 2026-07-16 -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - ZaLo Market</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- ZaLo Custom Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif !important;
            background-color: #070a08 !important;
            color: #f8fafc !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between zalo-branded-body">

    <!-- Global Header -->
    <header class="sticky top-0 z-50 bg-[#0f1c36]/90 border-b border-white/10 w-full py-4 px-6 flex justify-between items-center backdrop-blur-md zalo-branded-header">
        <a href="index.html" class="flex items-center gap-2 text-sm text-[#D4AF37] hover:text-white transition">
            <i class="fa-solid fa-arrow-right"></i>
            <span>العودة للمتجر</span>
        </a>
        <h1 id="category-header-title" class="text-lg font-black text-white font-bold">تصفح التصنيف</h1>
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-[#D4AF37]"><i class="fa-solid fa-tags"></i></div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-5xl mx-auto px-6 py-8">
        
        <div class="text-right space-y-1 mb-8">
            <h2 class="text-xl font-black text-white font-bold">المنتجات والسلع المتوفرة</h2>
            <p class="text-xs text-slate-400">جميع الأسعار بعملة الدينار الجزائري (دج) وتشمل الاستلام الآمن والفحص من طرف الزبون</p>
        </div>

        <!-- Search, Filter & Sort Section -->
        <div class="bg-slate-900/60 border border-slate-800 rounded-3xl p-5 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
            <!-- Search Box -->
            <div class="relative w-full md:w-1/3">
                <input type="text" id="productSearchInp" placeholder="ابحث باسم السلعة..." class="w-full bg-[#070a08] border border-slate-700/80 rounded-2xl py-3 px-4 text-sm text-white focus:border-[#D4AF37] focus:outline-none placeholder-slate-500 text-right">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-500"></i>
            </div>
            
            <!-- Filters Group -->
            <div class="flex flex-wrap gap-3 w-full md:w-auto justify-end">
                <!-- Sort Dropdown -->
                <div class="relative w-full sm:w-auto">
                    <select id="productSortSel" class="w-full sm:w-auto bg-[#070a08] border border-slate-700/80 rounded-2xl py-3 px-4 text-xs text-white focus:border-[#D4AF37] focus:outline-none appearance-none cursor-pointer pr-4 pl-10 text-right">
                        <option value="default">الترتيب الافتراضي</option>
                        <option value="price-asc">السعر: من الأقل للأعلى 📈</option>
                        <option value="price-desc">السعر: من الأعلى للأقل 📉</option>
                        <option value="name-asc">الاسم: أ - ي</option>
                        <option value="rating-desc">التقييم: الأعلى تقييماً ⭐</option>
                        <option value="date-desc">الأحدث: المضاف حديثاً 🆕</option>
                    </select>
                    <i class="fa-solid fa-sort absolute left-3 top-3.5 text-sm text-[#D4AF37] pointer-events-none"></i>
                </div>

                <!-- Stock Dropdown -->
                <div class="relative w-full sm:w-auto">
                    <select id="productStockSel" class="w-full sm:w-auto bg-[#070a08] border border-slate-700/80 rounded-2xl py-3 px-4 text-xs text-white focus:border-[#D4AF37] focus:outline-none appearance-none cursor-pointer pr-4 pl-10 text-right">
                        <option value="all">كل المنتجات</option>
                        <option value="instock">متوفر في المخزون فقط ✅</option>
                    </select>
                    <i class="fa-solid fa-box absolute left-3 top-3.5 text-sm text-[#D4AF37] pointer-events-none"></i>
                </div>
            </div>
        </div>

        <!-- Products Grid List -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- Rendered Dynamically via app.js -->
        </div>

    </main>

    <footer class="border-t border-slate-800/60 py-4 text-center text-xs text-slate-500 bg-slate-950/40">
        <p>© 2026 ZaLo Market - جميع الحقوق محفوظة.</p>
    </footer>

    <!-- Shared JS Engine -->
    <script src="js/app.js"></script>
</body>
</html>
