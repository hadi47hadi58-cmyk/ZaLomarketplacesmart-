<!-- ZaLo Marketplace Smart Sync Update: 2026-07-16 -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإشعارات - ZaLo Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --g1: #0ea5e9;
            --g2: #0284c7;
            --gold: #d4af37;
            --bg: #fcfbfa;
            --card-bg: #ffffff;
            --text: #0f172a;
            --gray: #64748b;
            --border: #cbd5e1;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(197, 160, 89, 0.2);
            padding-bottom: 20px;
        }
        h1 {
            color: var(--gold);
            font-size: 28px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .notif-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .notif-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .notif-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: all 0.2s ease;
            position: relative;
        }
        .notif-card.unread {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.03);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.05);
        }
        .notif-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        .notif-icon {
            background: rgba(37, 168, 96, 0.1);
            color: var(--gold);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .notif-content {
            flex: 1;
        }
        .notif-title {
            font-weight: 700;
            font-size: 15px;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .notif-desc {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 6px;
        }
        .notif-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .notif-time {
            font-size: 11px;
            color: var(--gold);
            font-weight: 600;
        }
        .card-actions {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.15s;
        }
        .btn-read {
            color: #82e3a1;
            background: rgba(37, 168, 96, 0.1);
        }
        .btn-read:hover {
            background: rgba(37, 168, 96, 0.2);
        }
        .btn-delete {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
        }
        .btn-delete:hover {
            background: rgba(255, 77, 77, 0.2);
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: var(--gray);
            font-size: 13px;
        }
        .back-btn {
            display: inline-block;
            background: var(--g1);
            color: #fff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.2s;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .back-btn:hover {
            background: var(--g2);
            border-color: var(--gold);
        }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fa-solid fa-bell"></i> مركز الإشعارات الفوري</h1>
    <p>تابع آخر تحديثات طلباتك وعروضك والعمليات الجارية في متجر ZaLo</p>
</div>

<div class="notif-actions">
    <button onclick="markAllRead()" class="back-btn" style="background: rgba(37, 168, 96, 0.15); border-color: rgba(37, 168, 96, 0.3); color: #82e3a1;"><i class="fa-solid fa-check-double"></i> قراءة الكل</button>
    <button onclick="clearAllNotifications()" class="back-btn" style="background: rgba(255, 77, 77, 0.15); border-color: rgba(255, 77, 77, 0.3); color: #ff4d4d;"><i class="fa-solid fa-trash"></i> مسح الجميع</button>
</div>

<div id="empty-state" style="display: none; text-align: center; padding: 40px; background: var(--card-bg); border: 1px dashed var(--border); border-radius: 12px; margin-bottom: 25px;">
    <i class="fa-solid fa-bell-slash" style="font-size: 40px; color: var(--gold); margin-bottom: 15px;"></i>
    <div style="font-size: 15px; font-weight: 700; color: #fff;">لا توجد إشعارات حالياً</div>
    <div style="font-size: 12px; color: var(--gray); margin-top: 5px;">سيتم تنبيهك هنا فور حدوث أي تحديثات جديدة.</div>
</div>

<div class="notif-container" id="notif-container">
    <!-- Will be populated dynamically -->
</div>

<div style="text-align: center; margin-top: 30px;">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-house"></i> العودة للرئيسية</a>
</div>

<script type="module">
    import { supabase } from "./js/supabase-config.js";

    let cachedNotifications = [];

    const onboarding = [
        {
            id: "init_1",
            title: "مرحباً بك في ZaLo! 🏛️",
            text: "أهلاً بك في أكبر سوق ذكي دائم ومجاني لخدمة المتاجر والسائقين وتوصيل الشحنات عبر 69 ولاية جزائرية.",
            icon: "🎉",
            read: false,
            timestamp: Date.now() - 600000
        },
        {
            id: "init_2",
            title: "تتبع شحنتك بثوانٍ 📦",
            text: "أدخل رقم هاتفك في صفحة 'طلباتي' لمتابعة حالة شاحنتك بنظام التنبيه والرنين المباشر فور تغيرها من تاجر أو سائق.",
            icon: "🔔",
            read: false,
            timestamp: Date.now() - 3600000
        }
    ];

    async function loadNotifications() {
        let localList = [];
        try {
            const localData = localStorage.getItem('zalo_notifications_list_v2');
            if (localData) {
                localList = JSON.parse(localData);
            } else {
                localList = [...onboarding];
                localStorage.setItem('zalo_notifications_list_v2', JSON.stringify(localList));
            }
        } catch (e) {
            localList = [...onboarding];
        }

        let merged = [...localList];

        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user) {
                const { data: remoteNotifs, error } = await supabase
                    .from('notifications')
                    .select('*')
                    .eq('user_id', session.user.id);
                    
                if (!error && remoteNotifs) {
                    remoteNotifs.forEach(rn => {
                        if (!merged.some(m => String(m.id) === String(rn.id))) {
                            merged.push({
                                id: rn.id,
                                title: rn.title,
                                text: rn.message,
                                icon: "🔔",
                                read: rn.is_read,
                                timestamp: new Date(rn.created_at).getTime(),
                                isRemote: true
                            });
                        }
                    });
                }
            }
        } catch (e) {
            console.warn("Could not load notifications from Supabase:", e);
        }

        merged.sort((a, b) => b.timestamp - a.timestamp);
        cachedNotifications = merged;
        renderNotifications();
    }

    function formatArabicTime(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return 'منذ ثوانٍ';
        const mins = Math.floor(diff / 60000);
        if (mins < 60) return `منذ ${mins} دقيقة`;
        const hours = Math.floor(diff / 3600000);
        if (hours < 24) return `منذ ${hours} ساعة`;
        const days = Math.floor(diff / 86400000);
        return `منذ ${days} يوم`;
    }

    function renderNotifications() {
        const list = cachedNotifications;
        const container = document.getElementById('notif-container');
        const emptyState = document.getElementById('empty-state');

        if (list.length === 0) {
            container.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }

        emptyState.style.display = 'none';
        container.innerHTML = list.map(n => {
            const timeStr = formatArabicTime(n.timestamp);
            const isUnread = !n.read;
            const iconHtml = n.icon && n.icon.length > 2 && n.icon.startsWith('fa-') 
                ? `<i class="fa-solid ${n.icon}"></i>` 
                : (n.icon || '🔔');

            return `
                <div class="notif-card ${isUnread ? 'unread' : ''}" id="card_${n.id}">
                    <div class="notif-icon">${iconHtml}</div>
                    <div class="notif-content">
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-desc">${n.text}</div>
                        <div class="notif-footer">
                            <div class="notif-time">🕒 ${timeStr}</div>
                            <div class="card-actions">
                                ${isUnread ? `<button onclick="markRead('${n.id}')" class="btn-action btn-read"><i class="fa-solid fa-check"></i> مقروء</button>` : ''}
                                <button onclick="deleteNotif('${n.id}')" class="btn-action btn-delete"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function markRead(id) {
        const notif = cachedNotifications.find(n => String(n.id) === String(id));
        if (notif) {
            notif.read = true;
            if (notif.isRemote) {
                try {
                    await supabase.from('notifications').update({ is_read: true }).eq('id', id);
                } catch(e) {
                    console.error(e);
                }
            } else {
                const localOnly = cachedNotifications.filter(n => !n.isRemote);
                localStorage.setItem('zalo_notifications_list_v2', JSON.stringify(localOnly));
            }
            renderNotifications();
        }
    }

    async function markAllRead() {
        cachedNotifications.forEach(n => n.read = true);
        const localOnly = cachedNotifications.filter(n => !n.isRemote);
        localStorage.setItem('zalo_notifications_list_v2', JSON.stringify(localOnly));
        
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user) {
                await supabase.from('notifications').update({ is_read: true }).eq('user_id', session.user.id);
            }
        } catch (e) {
            console.error(e);
        }
        renderNotifications();
    }

    async function deleteNotif(id) {
        const notif = cachedNotifications.find(n => String(n.id) === String(id));
        if (notif) {
            if (notif.isRemote) {
                try {
                    await supabase.from('notifications').delete().eq('id', id);
                } catch (e) {
                    console.error(e);
                }
            }
            cachedNotifications = cachedNotifications.filter(n => String(n.id) !== String(id));
            const localOnly = cachedNotifications.filter(n => !n.isRemote);
            localStorage.setItem('zalo_notifications_list_v2', JSON.stringify(localOnly));
            renderNotifications();
        }
    }

    async function clearAllNotifications() {
        if (confirm('هل أنت متأكد من مسح جميع الإشعارات؟')) {
            localStorage.setItem('zalo_notifications_list_v2', JSON.stringify([]));
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session && session.user) {
                    await supabase.from('notifications').delete().eq('user_id', session.user.id);
                }
            } catch(e) {
                console.error(e);
            }
            cachedNotifications = [];
            renderNotifications();
        }
    }

    // Expose functions to window
    window.markRead = markRead;
    window.markAllRead = markAllRead;
    window.deleteNotif = deleteNotif;
    window.clearAllNotifications = clearAllNotifications;

    // Initial render
    document.addEventListener('DOMContentLoaded', loadNotifications);
</script>

<div class="footer">
    &copy; 2026 منصة ZaLo Smart. جميع الحقوق محفوظة لجمهورية الجزائر الديمقراطية الشعبية.
</div>

</body>
</html>
