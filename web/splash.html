<!DOCTYPE html>
<!-- ZaLo Marketplace Smart-Spark Final Version Update (Sync Trigger) -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZaLo - السوق الذكي الجزائري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    /* Responsive background styling */
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .splash-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      font-size: 100px;
      animation: bounce 0.8s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }
    .brand {
      font-size: 36px;
      font-weight: 900;
      color: white;
      letter-spacing: 2px;
    }
    .brand .gold { color: #d4af37; }
    .tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      position: absolute;
      bottom: 30px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <!-- Circular Golden Palm Tree Logo -->
    <svg width="120" height="120" viewBox="0 0 100 100" style="margin-bottom: 8px;">
      <!-- Gold Outer Circle -->
      <circle cx="50" cy="50" r="42" fill="none" stroke="#d4af37" stroke-width="2.5" />
      <!-- Gold Inner Ring -->
      <circle cx="50" cy="50" r="38" fill="none" stroke="#d4af37" stroke-width="0.8" stroke-dasharray="2 2" />
      
      <!-- Golden Palm Tree SVG Paths -->
      <!-- Trunk -->
      <path d="M47.5,75 L52.5,75 L51,45 L49,45 Z" fill="#d4af37" />
      
      <!-- Fronds (Left) -->
      <path d="M49,46 C41,43 33,48 27,56 C35,51 43,49 49,48 Z" fill="#d4af37" />
      <path d="M49,46 C39,37 30,39 22,45 C32,42 41,43 49,46 Z" fill="#d4af37" />
      <path d="M49,46 C42,29 35,27 28,30 C36,31 43,37 49,44 Z" fill="#d4af37" />
      
      <!-- Fronds (Right) -->
      <path d="M51,46 C59,43 67,48 73,56 C65,51 57,49 51,48 Z" fill="#d4af37" />
      <path d="M51,46 C61,37 70,39 78,45 C68,42 59,43 51,46 Z" fill="#d4af37" />
      <path d="M51,46 C58,29 65,27 72,30 C64,31 57,37 51,44 Z" fill="#d4af37" />
      
      <!-- Top Fronds -->
      <path d="M50,45 C50,26 45,17 40,14 C47,19 50,31 50,45 Z" fill="#d4af37" />
      <path d="M50,45 C50,26 55,17 60,14 C53,19 50,31 50,45 Z" fill="#d4af37" />
      
      <!-- Letters "ZAL" in the center -->
      <rect x="41" y="55" width="18" height="12" rx="3" fill="#ffffff" stroke="#d4af37" stroke-width="1.3" />
      <text x="50" y="64" font-family="'Cairo', sans-serif" font-size="8" font-weight="900" fill="#d4af37" text-anchor="middle" letter-spacing="0.5">ZAL</text>
    </svg>
    <div class="brand" style="font-family: 'Cairo', sans-serif; font-size: 38px; font-weight: 900; color: #ffffff;">Za<span class="gold">Lo</span></div>
    <div class="tagline">السوق الذكي الجزائري</div>
    <div class="loader"></div>
  </div>
  <div class="subtitle">جاري التحضير...</div>

  <script type="module">
    // قراءة التوكن والدور لتوجيه المستخدم بشكل صحيح ومنع حلقة التكرار اللانهائي
    const token = localStorage.getItem('zalo_session_jwt') || localStorage.getItem('zalo_token');
    const rawRole = localStorage.getItem('zalo_user_role') || localStorage.getItem('zalo_role') || 'customer';
    const role = rawRole.toLowerCase().trim();

    async function checkTokenAndRedirect() {
      if (!token) {
        // لا يوجد توكن نشط -> التوجيه إلى الصفحة الرئيسية العامة (index.html)
        console.log("[Splash Router] No active token found. Redirecting to index.html...");
        window.location.href = 'index.html';
        return;
      }

      // تحديد رابط الخادم بناءً على بيئة التشغيل
      const NESTJS_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:3000/api'
        : (window.location.hostname.endsWith('run.app') || window.location.hostname.includes('google.com')
           ? `${window.location.origin}/api`
           : 'https://zalo-smart-backend-service-api.run.app/api');

      console.log(`[Splash Router] Active token detected. Verifying validity via: ${NESTJS_BASE_URL}/users/profile`);

      try {
        const response = await fetch(`${NESTJS_BASE_URL}/users/profile`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          const result = await response.json();
          if (result && result.data) {
            const user = result.data;
            const updatedRole = (user.role || 'customer').toLowerCase().trim();
            console.log(`[Splash Router] Token verified successfully! Role is: ${updatedRole}`);
            
            // مزامنة الدور والبيانات المستردة بدقة لضمان مطابقة حقيقية
            localStorage.setItem('zalo_user_role', user.role || 'customer');
            localStorage.setItem('zalo_role', user.role || 'customer');
            localStorage.setItem('zalo_user_email', user.email || '');
            localStorage.setItem('zalo_user_name', user.name || '');

            if (updatedRole === 'merchant') {
              window.location.href = 'dashboard-store.html';
            } else if (updatedRole === 'admin') {
              window.location.href = 'dashboard-admin.html';
            } else {
              window.location.href = 'customer-home.html';
            }
            return;
          }
        } else if (response.status === 401 || response.status === 403) {
          console.warn(`[Splash Router] Validation failed (Status ${response.status}). Cleaning invalid session...`);
          
          // تنظيف كامل التخزين المحلي لمنع ظهور العميل كمسجل دخول بوثيقة غير صالحة
          localStorage.removeItem('zalo_session_jwt');
          localStorage.removeItem('zalo_token');
          localStorage.removeItem('zalo_local_session');
          localStorage.removeItem('zalo_active_session');
          localStorage.removeItem('zalo_user_role');
          localStorage.removeItem('zalo_role');
          localStorage.removeItem('user_email');
          sessionStorage.removeItem('admin_logged_in_session');

          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        console.warn("[Splash Router] Network or server error during validation. Falling back to local state for offline resilience:", err.message);
      }

      // خطة احتياطية في حالة انقطاع الشبكة أو استخدام توكن تجريبي محلي غير مسجل في السيرفر
      console.log(`[Splash Router] Routing with offline fallback role: ${role}`);
      if (role === 'merchant') {
        window.location.href = 'dashboard-store.html';
      } else if (role === 'admin') {
        window.location.href = 'dashboard-admin.html';
      } else {
        window.location.href = 'customer-home.html';
      }
    }

    // الانتظار ثانيتين لتهيئة وعرض الشعار الجمالي للمنصة
    setTimeout(checkTokenAndRedirect, 2000);
  </script>
</body>
</html>
